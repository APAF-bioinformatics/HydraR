# HydraR Workflow: LLM Fan-Out and Fan-In
# File: parallel_fan_out.yml
# <!-- APAF Bioinformatics | parallel_fan_out.yml | Approved | 2026-04-03 -->

graph: |
  graph TD
    director["Director | type=llm | role_id=director | driver=gemini_api | prompt_id=prompt_director"]
    writer_action["Action Writer | type=llm | role_id=writer_action | driver=gemini_api | prompt_id=prompt_action"]
    writer_mystery["Mystery Writer | type=llm | role_id=writer_mystery | driver=gemini_api | prompt_id=prompt_mystery"]
    writer_romance["Romance Writer | type=llm | role_id=writer_romance | driver=gemini_api | prompt_id=prompt_romance"]
    editor["Master Editor | type=llm | role_id=editor | driver=gemini_api | prompt_id=prompt_editor"]

    director --> writer_action
    director --> writer_mystery
    director --> writer_romance

    writer_action --> editor
    writer_mystery --> editor
    writer_romance --> editor

roles:
  director: >
    You are the creative director setting the stage for a collaborative story. 
    Expand on the user's premise with sensory details.
  writer_action: >
    You are an action-thriller writer. Write a short, fast-paced, high-stakes scene.
  writer_mystery: >
    You are a mystery writer. Write a short, suspenseful scene with a hidden clue.
  writer_romance: >
    You are a romance writer. Write a short, emotional scene focusing on character connection.
  editor: >
    You are the master editor. Combine the scenes provided by the action, mystery, 
    and romance writers into a single, cohesive narrative that flows logically.

logic:
  prompt_director: >
    sprintf("Expand slightly on this premise: %s", state$get("premise"))
  prompt_action: >
    sprintf("Based on the director's vision: %s\nWrite an action scene.", state$get("director"))
  prompt_mystery: >
    sprintf("Based on the director's vision: %s\nWrite a mystery scene.", state$get("director"))
  prompt_romance: >
    sprintf("Based on the director's vision: %s\nWrite a romantic or emotional scene.", state$get("director"))
  prompt_editor: >
    sprintf(
      "Synthesize these three scenes into one short story:\n\nAction: %s\n\nMystery: %s\n\nRomance: %s",
      state$get("writer_action"),
      state$get("writer_mystery"),
      state$get("writer_romance")
    )

start_node: director

initial_state:
  premise: "A cybernetic cat discovers a hidden underground city."
