# HydraR Workflow: Round-Trip Resiliency
# File: round_trip_resiliency.yml
# <!-- APAF Bioinformatics | round_trip_resiliency.yml | Approved | 2026-04-03 -->

graph: |
  graph TD
    Start["Initial Search | type=logic | logic_id=default_logic"]
    Summarize["Summarize Findings | type=logic | logic_id=default_logic"]
    Check["Check Quality | type=logic | logic_id=check_logic"]
    Publish["Final Report | type=logic | logic_id=default_logic"]
    ReSearch["Deep Search | type=logic | logic_id=default_logic"]
    
    Start --> Summarize
    Summarize --> Check
    Check --> Publish
    Check --> ReSearch
    ReSearch --> Summarize

conditional_edges:
  Check:
    test: "isTRUE(out)"
    if_true: "Publish"
    if_false: "ReSearch"

logic:
  check_logic: |
    {
      # A logic node that fails the first time but succeeds the second
      run_count <- state$get("check_runs") %||% 0
      state$set("check_runs", run_count + 1)
      
      if (run_count == 0) {
        message("   [Check] Quality check failed. Routing to ReSearch...")
        list(status = "SUCCESS", output = FALSE)
      } else {
        message("   [Check] Quality check passed!")
        list(status = "SUCCESS", output = TRUE)
      }
    }
  default_logic: |
    {
      list(status = "SUCCESS", output = paste("Result from", state$node_id))
    }

start_node: Start

initial_state:
  check_runs: 0
