# HydraR Workflow: Hierarchical Agents (Critique & Revise)
# File: hierarchical_agents.yml
# <!-- APAF Bioinformatics | hierarchical_agents.yml | Approved | 2026-04-03 -->

graph: |
  graph TD
    Writer["Story Author | type=llm | role_id=creative_writer | driver=gemini_api | prompt_id=write_prompt"]
    Reviewer["Literary Editor | type=llm | role_id=literary_editor | driver=gemini_api | prompt_id=critique_prompt"]
    
    Writer --> Reviewer
    Reviewer --> Writer

conditional_edges:
  Reviewer:
    test: "grepl(\"Approved\", out, ignore.case = TRUE)"
    if_true: null
    if_false: "Writer"

roles:
  creative_writer: >
    You are a creative writer. Draft a short story based on the initial prompt 
    or update it according to reviewer feedback. Output exactly the story draft.
  literary_editor: >
    You are a literary editor. Critically review the story draft for tone, 
    pacing, and quality. If it is excellent, say 'Approved'. Otherwise, 
    provide specific constructive critique.

logic:
  write_prompt: |
    {
      feedback <- state$get("Reviewer")
      feedback_text <- if (!is.null(feedback)) sprintf("\nFeedback: %s", feedback) else ""
      sprintf("Prompt: %s%s\nDraft the story.", state$get("story_prompt"), feedback_text)
    }
  critique_prompt: |
    {
      sprintf("Draft: %s\nReview this draft for quality and tone.", state$get("Writer"))
    }

start_node: Writer

initial_state:
  story_prompt: "A story about a robot learning to cook a complex French meal."
