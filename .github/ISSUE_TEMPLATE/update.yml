name: 🔄 Update
description: Template for tracking project updates
title: "[UPDATE] "
labels: ["enhancement", "update"]
body:
  - type: markdown
    attributes:
      value: |
        ## Update
        Please describe the changes or updates needed.

  - type: dropdown
    id: priority
    attributes:
      label: Priority Level
      description: How urgent is this update?
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: input
    id: area
    attributes:
      label: Area of Change
      description: Which part of HydraR does this affect?
      placeholder: "e.g., Drivers, Engine, UI"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is being updated?
      placeholder: "This update involves..."
    validations:
      required: true

