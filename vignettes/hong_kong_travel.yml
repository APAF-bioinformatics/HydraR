# APAF-Agentic-Standard Workflow Definition: Sydney to Hong Kong
# File: hong_kong_travel.yml
# Purpose: Declarative definition of travel planning agents
# <!-- APAF Bioinformatics | hong_kong_travel.yml | Approved | 2026-04-02 -->

graph: |
  graph TD
    Planner["Travel Planner | type=llm | role_id=travel_concierge | driver=gemini_api | model=gemini-3.1-flash-lite-preview | prompt_id=plan_prompt"]
    Validator["Constraint Auditor | type=logic | logic_id=validate_constraints | retries=3"]
    ImageGate["Image Gate | type=logic | logic_id=check_image_status"]
    ImageGenerator["Image Generator | type=logic | logic_id=generate_and_save_images"]
    TemplateManager["Template Provider | type=logic | logic_id=provide_template"]
    PamphletFormatter["Pamphlet Formatter | type=logic | logic_id=format_pamphlet"]
    Finalizer["Itinerary Saver | type=logic | logic_id=save_itinerary"]

    Planner --> Validator
    Validator --> Planner
    Validator --> ImageGate
    ImageGate --> ImageGenerator
    ImageGate --> TemplateManager
    ImageGenerator --> TemplateManager
    TemplateManager --> PamphletFormatter
    PamphletFormatter --> Finalizer

conditional_edges:
  Validator:
    test: "isTRUE(out$validation_passed)"
    if_true: "ImageGate"
    if_false: "Planner"
  ImageGate:
    test: "isTRUE(out$needs_generation)"
    if_true: "ImageGenerator"
    if_false: "TemplateManager"

roles:
  travel_concierge: >
    You are a professional travel concierge. Create detailed, day-by-day itineraries 
    for the requested destination and time period. 
    Ensure you include specific locations and dining recommendations requested by the user.
    Format your output as clean Markdown.
  
  image_artist: >
    You are a professional AI image artist. Create vivid, sensory-rich descriptions 
    for travel photography. For each location requested, provide a detailed 
    visual prompt that captures the essence of the place.

logic:
  plan_prompt: >
    sprintf(
      "Plan a trip from %s to %s from %s to %s on %s. Must include: %s.",
      state$get("origin"), state$get("destination"),
      state$get("departure_date"), state$get("return_date"),
      state$get("airline"), paste(state$get("must_include"), collapse = ", ")
    )
  
  image_prompt: >
    sprintf(
      "Generate five high-quality travel photography prompts for the following locations in Hong Kong: %s.",
      paste(state$get("must_include"), collapse = ", ")
    )

  validate_constraints: >
    {
      itinerary <- state$get("Planner") %||% ""
      must_include <- state$get("must_include")
      found <- purrr::map_lgl(must_include, \(x){ grepl(x, itinerary, ignore.case = TRUE)} )

      report <- paste0(
        "### Constraint Audit Report\n",
        "Date: ", Sys.time(), "\n",
        paste0("- [", ifelse(found, "x", " "), "] ", must_include, collapse = "\n")
      )

      if (all(found)) {
        list(status = "SUCCESS", output = list(validation_passed = TRUE, report = report))
      } else {
        missing <- must_include[!found]
        list(status = "SUCCESS", output = list(
          validation_passed = FALSE,
          message = paste("Missing:", paste(missing, collapse = ", ")),
          report = report
        ))
      }
    }

  check_image_status: |
    {
      force <- state$get("force_regenerate_images") %||% FALSE
      
      # Diagnostic: Print current WD to help identify pathing mismatches
      curr_wd <- getwd()
      message("DEBUG: ImageGate calling from CWD: ", curr_wd)
      
      # Use the most specific path available
      possible_dirs <- c("vignettes/images", "images")
      img_dir <- possible_dirs[purrr::map_lgl(possible_dirs, dir.exists)][1] %||% "vignettes/images"
      
      required <- c("victoria_peak.jpg", "man_mo_temple.jpg", "tsim_sha_tsui.jpg", "temple_street.jpg", "star_ferry.jpg")
      
      missing <- required[!purrr::map_lgl(required, \(f) file.exists(file.path(img_dir, f)))]
      
      if (force || length(missing) > 0) {
        targets <- if (force) required else missing
        message("DEBUG: ImageGate found missing images in ", img_dir, ": ", paste(targets, collapse = ", "))
        list(status = "SUCCESS", output = list(needs_generation = TRUE, targets = targets))
      } else {
        message("All images found in: ", img_dir)
        list(status = "SUCCESS", output = list(needs_generation = FALSE))
      }
    }

  generate_and_save_images: |
    {
      tryCatch({
        message("DEBUG: generate_and_save_images logic entry")
        targets <- state$get("targets")
        message("DEBUG: targets from state: ", paste(targets %||% "NULL", collapse = ", "))
        
        if (is.null(targets) || length(targets) == 0) {
          message("DEBUG: No targets found, exiting early.")
          return(list(status = "SUCCESS", output = list(image_prompts = list())))
        }

        # Initialize driver and options
        aspect_ratio <- state$get("aspect_ratio") %||% "1:1"
        driver <- resolve_default_driver("gemini_image")
        driver$model_name <- "gemini-3.1-flash-image-preview"
        
        # Directory-aware pathing: If "vignettes/" exists in CWD, we are at project root.
        driver$output_dir <- if (dir.exists("vignettes")) "vignettes/images" else "images"
        
        # Per-item generation with detailed error capture
        results <- purrr::imap(targets, \(filename, idx) {
          tryCatch({
            # Rate-limit guard: pause between API calls
            if (idx > 1) Sys.sleep(3)
            loc <- tools::file_path_sans_ext(filename)
            loc <- gsub("_", " ", loc)
            prompt <- sprintf("Professional travel photography of %s, Hong Kong. Vibrant, high-resolution, wide landscape format.", loc)
            message("DEBUG: Generating image for: ", filename)
            
            img_path <- driver$call(prompt, cli_opts = list(
              filename = filename
            ))
            list(success = TRUE, filename = filename, prompt = prompt, path = img_path)
          }, error = function(e) {
            msg <- if (inherits(e, "error")) e$message else as.character(e)
            message("DEBUG: Failed image generation for ", filename, ": ", msg)
            list(success = FALSE, filename = filename, error = msg)
          })
        })
        
        # Check for any failures
        failures <- purrr::keep(results, ~ !.x$success)
        if (length(failures) > 0) {
          err_msg <- paste(purrr::map_chr(failures, ~ sprintf("%s: %s", .x$filename, .x$error)), collapse = "; ")
          stop(sprintf("One or more images failed generation: %s", err_msg))
        }

        # Harmonize prompts for state
        prompts <- list()
        purrr::walk(results, \(res) { prompts[[res$filename]] <<- res$prompt })

        list(status = "SUCCESS", output = list(image_prompts = prompts))
      }, error = function(e) {
        # This will now capture the concatenated individual errors
        msg <- if (inherits(e, "error")) e$message else as.character(e)
        message("ERROR in generate_and_save_images: ", msg)
        list(status = "failed", output = NULL, error = msg)
      })
    }

  provide_template: |
    {
      template <- "
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@600&display=swap');
          .pamphlet-page {
            width: 297mm;
            height: 210mm;
            padding: 15mm;
            display: flex;
            gap: 10mm;
            background: #fdfdfd;
            page-break-after: always;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
          }
          .pamphlet-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            font-size: 10pt;
            line-height: 1.4;
            color: #333;
          }
          .cover-column {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: white;
            padding: 10mm;
            border-radius: 8px;
            justify-content: center;
            align-items: center;
            text-align: center;
          }
          .cover-title {
            font-family: 'Outfit', sans-serif;
            font-size: 28pt;
            margin-bottom: 10mm;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
          }
          .pamphlet-img {
            width: 100%;
            height: 40mm;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 5mm;
          }
          .content-text {
            text-align: justify;
          }
        </style>
        <div class='pamphlet-page'>
          <div class='pamphlet-column cover-column'>
            <div class='cover-title'>{{TITLE}}</div>
            <p>Your Bespoke Adventure Awaits</p>
          </div>
          <div class='pamphlet-column'>
            <img src='images/victoria_peak.jpg' class='pamphlet-img' />
            <div class='content-text'>{{COL2}}</div>
          </div>
          <div class='pamphlet-column'>
            <img src='images/man_mo_temple.jpg' class='pamphlet-img' />
            <div class='content-text'>{{COL3}}</div>
          </div>
        </div>
        <div class='pamphlet-page'>
          <div class='pamphlet-column'>
            <img src='images/tsim_sha_tsui.jpg' class='pamphlet-img' />
            <div class='content-text'>{{COL4}}</div>
          </div>
          <div class='pamphlet-column'>
            <img src='images/temple_street.jpg' class='pamphlet-img' />
            <div class='content-text'>{{COL5}}</div>
          </div>
          <div class='pamphlet-column'>
            <img src='images/star_ferry.jpg' class='pamphlet-img' />
            <div class='content-text'>{{COL6}}</div>
          </div>
        </div>
      "
      list(status = "SUCCESS", output = template)
    }

  format_pamphlet: |
    {
      itinerary <- state$get("Planner")
      template <- state$get("TemplateManager")
      destination <- state$get("destination")
      
      # Split itinerary into roughly 5 parts for columns 2-6
      itinerary_lines <- strsplit(itinerary, "\n")[[1]]
      itinerary_lines <- itinerary_lines[itinerary_lines != ""] 
      
      n <- length(itinerary_lines)
      col_size <- ceiling(n / 5)
      
      parts <- list()
      for (i in 1:5) {
        start <- ((i-1) * col_size) + 1
        end <- min(i * col_size, n)
        if (start <= n) {
          parts[[i]] <- paste(itinerary_lines[start:end], collapse = "\n")
        } else {
          parts[[i]] <- ""
        }
      }
      
      render_md <- function(x) {
        if (requireNamespace("commonmark", quietly = TRUE)) {
          commonmark::markdown_html(x)
        } else {
          gsub("\n", "<br/>", x) 
        }
      }

      html_out <- template
      html_out <- gsub("{{TITLE}}", paste("Explore", destination), html_out, fixed = TRUE)
      html_out <- gsub("{{COL2}}", render_md(parts[[1]]), html_out, fixed = TRUE)
      html_out <- gsub("{{COL3}}", render_md(parts[[2]]), html_out, fixed = TRUE)
      html_out <- gsub("{{COL4}}", render_md(parts[[3]]), html_out, fixed = TRUE)
      html_out <- gsub("{{COL5}}", render_md(parts[[4]]), html_out, fixed = TRUE)
      html_out <- gsub("{{COL6}}", render_md(parts[[5]]), html_out, fixed = TRUE)
      
      list(status = "SUCCESS", output = html_out)
    }

  save_itinerary: |
    {
      itinerary <- state$get("Planner")
      pamphlet <- state$get("PamphletFormatter")
      # Note: logic node outputs are merged into state root by AgentState$set()
      validation_passed <- state$get("validation_passed")
      report <- state$get("report")
      
      base_path <- if (dir.exists("vignettes")) "vignettes/" else ""
      
      if (!is.null(itinerary)) {
        # Save itinerary
        itinerary_path <- paste0(base_path, "hong_kong_itinerary.md")
        writeLines(as.character(itinerary), itinerary_path)
        message("Saved itinerary to: ", itinerary_path)
        
        # Save pamphlet
        if (!is.null(pamphlet)) {
          pamphlet_path <- paste0(base_path, "hong_kong_pamphlet.html")
          full_html <- sprintf("<!DOCTYPE html><html><head><meta charset='utf-8'><title>HK Travel Pamphlet</title></head><body>%s</body></html>", pamphlet)
          writeLines(full_html, pamphlet_path)
          message("Saved pamphlet to: ", pamphlet_path)
        }
        
        # Save validation report
        if (!is.null(report)) {
          report_path <- paste0(base_path, "validation_report.md")
          writeLines(as.character(report), report_path)
          message("Saved validation report to: ", report_path)
        } else {
          warning("No validation report found in state.")
        }
        
        list(status = "SUCCESS", output = "All artifacts saved successfully.")
      } else {
        list(status = "FAILED", output = "No itinerary found in state.")
      }
    }

start_node: Planner

initial_state:
  origin: "Sydney"
  destination: "Hong Kong"
  departure_date: "2026-05-26"
  return_date: "2026-06-01"
  airline: "Qantas"
  must_include:
    - "Cheung Chau Island"
    - "Spaghetti House"
    - "Local Cuisine"
  itinerary_draft: null
  validation_passed: false
