# APAF-Agentic-Standard Workflow Definition: Sydney to Hong Kong
# File: hong_kong_travel.yml
# Purpose: Declarative definition of travel planning agents
# <!-- APAF Bioinformatics | hong_kong_travel.yml | Approved | 2026-04-02 -->

graph: |
  graph TD
    Planner["Travel Planner | type=llm | role_id=travel_concierge | driver=gemini_api | model=gemini-3.1-flash-lite-preview | prompt_id=plan_prompt"]
    Validator["Constraint Auditor | type=logic | logic_id=validate_constraints | retries=3"]
    ImageGate["Image Gate | type=logic | logic_id=check_image_status"]
    ImageGenerator["Image Generator | type=logic | logic_id=generate_and_save_images"]
    TemplateManager["Template Provider | type=logic | logic_id=provide_template"]
    PamphletFormatter["Pamphlet Formatter | type=logic | logic_id=format_pamphlet"]
    Finalizer["Itinerary Saver | type=logic | logic_id=save_itinerary"]

    Planner --> Validator
    Validator --> Planner
    Validator --> ImageGate
    ImageGate --> ImageGenerator
    ImageGate --> TemplateManager
    ImageGenerator --> TemplateManager
    TemplateManager --> PamphletFormatter
    PamphletFormatter --> Finalizer

conditional_edges:
  Validator:
    test: "logic/test_validation.R"
    if_true: "ImageGate"
    if_false: "Planner"
  ImageGate:
    test: "logic/test_image_needed.R"
    if_true: "ImageGenerator"
    if_false: "TemplateManager"

roles:
  travel_concierge: >
    You are a professional travel concierge. Create detailed, day-by-day itineraries 
    for the requested destination and time period. 
    Ensure you include specific locations and dining recommendations requested by the user.
    Format your output as clean Markdown.
  
  image_artist: >
    You are a professional AI image artist. Create vivid, sensory-rich descriptions 
    for travel photography. For each location requested, provide a detailed 
    visual prompt that captures the essence of the place.

logic:
  plan_prompt: "logic/plan_prompt.R"
  image_prompt: "logic/image_prompt.R"
  validate_constraints: "logic/validate_constraints.R"
  check_image_status: "logic/check_image_status.R"
  generate_and_save_images: "logic/generate_and_save_images.R"
  provide_template: "logic/provide_template.R"
  format_pamphlet: "logic/format_pamphlet.R"
  save_itinerary: "logic/save_itinerary.R"

start_node: Planner

initial_state:
  origin: "Sydney"
  destination: "Hong Kong"
  departure_date: "2026-05-26"
  return_date: "2026-06-01"
  airline: "Qantas"
  must_include:
    - "Cheung Chau Island"
    - "Spaghetti House"
    - "Local Cuisine"
  itinerary_draft: null
  validation_passed: false
