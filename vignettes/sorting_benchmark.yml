# APAF Bioinformatics | sorting_benchmark.yml | Approved | 2026-03-30
metadata:
  title: "Sorting Algorithm Benchmark Workflow"
  author: "APAF Agent"
  version: "1.0.0"

roles:
  bubble: >
    System: You are an expert R developer.
    Task: Write a single R function named `bubble_sort` that implements the bubble sort algorithm.
    Input: A numeric vector `x`.
    Output: The sorted numeric vector.
    Constraints: 
    - Output ONLY the raw R code.
    - DO NOT use markdown code blocks (no ```).
    - DO NOT include Any commentary, introductory text, OR trailing text.
  quick: >
    System: You are an expert R developer.
    Task: Write a single R function named `quick_sort` that implements the quick sort algorithm.
    Input: A numeric vector `x`.
    Output: The sorted numeric vector.
    Constraints: 
    - Output ONLY the raw R code.
    - DO NOT use markdown code blocks (no ```).
    - DO NOT include Any commentary, introductory text, OR trailing text.
  merge: >
    System: You are an expert R developer.
    Task: Write a single R function named `merge_sort` that implements the merge sort algorithm.
    Input: A numeric vector `x`.
    Output: The sorted numeric vector.
    Constraints: 
    - Output ONLY the raw R code.
    - DO NOT use markdown code blocks (no ```).
    - DO NOT include Any commentary, introductory text, OR trailing text.

logic:
  run_benchmark: "logic/run_benchmark.R"

  run_plot: "logic/run_plot.R"

graph: |
  graph TD
      bubble["Bubble Agent | type=llm | role_id=bubble | driver=anthropic_api | output_format=r | output_path=bubble_sort.R"]
      quick["Quick Agent | type=llm | role_id=quick | driver=anthropic_api | output_format=r | output_path=quick_sort.R"]
      merge["Merge Agent | type=llm | role_id=merge | driver=anthropic_api | output_format=r | output_path=merge_sort.R"]
      merger["Merge Harmonizer | type=merge"]
      benchmark["Benchmark | type=logic | logic_id=run_benchmark"]
      plot["Visualize | type=logic | logic_id=run_plot"]

      bubble --> merger
      quick --> merger
      merge --> merger
      merger --> benchmark
      benchmark --> plot

initial_state:
  input: "Start sorting benchmark"
  n_elements: 2000
  n_trials: 100

