    desc: Infrastructure for isolated execution and conflict resolution.
    contents:
      - WorktreeManager
      - ConflictResolver
      - create_merge_harmonizer
      - RestrictedState
  - title: LLM Drivers
    desc: Provider-agnostic interfaces for CLI-based and API-based LLMs.
    contents:
      - AgentDriver
      - GeminiCLIDriver
      - GeminiAPIDriver
      - GeminiImageDriver
      - OpenAIAPIDriver
      - AnthropicAPIDriver
      - OllamaDriver
      - AnthropicCLIDriver
      - CopilotCLIDriver
      - OpenAICodexCLIDriver
