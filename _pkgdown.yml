    desc: Helper functions for mermaid visualization, validation, and maintenance.
    contents:
      - AgentTool
      - dag_create
      - parse_mermaid
      - mermaid_to_dag
      - extract_r_code_advanced
      - is_named_list
      - format_toolset
      - reducer_merge_list
      - reducer_append
      - validate_workflow_file
      - validate_workflow_full
      - render_workflow_file
      - cleanup_jules_branches

