url: https://github.com/APAF-bioinformatics/HydraR
template:
  bootstrap: 5
  params:
    bootswatch: zephyr

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [github]
  components:
      text: Get Started
      href: articles/manual.html

reference:
  - title: Core Orchestration
    desc: The heart of the HydraR framework.
    contents:
      - AgentDAG
      - AgentNode
      - AgentState
  - title: Agent Nodes
    desc: Specialized nodes for LLM interaction and logical routing.
    contents:
      - AgentLLMNode
      - AgentLogicNode
      - AgentBashNode
      - AgentPythonNode
      - add_llm_node
      - add_logic_node
      - dag_add_llm_node
      - dag_add_logic_node
      - standard_node_factory
  - title: Parallelism & Merge Harmonization
    desc: Infrastructure for isolated execution and conflict resolution.
    contents:
      - WorktreeManager
      - ConflictResolver
      - create_merge_harmonizer
      - RestrictedState
  - title: LLM Drivers
    desc: Provider-agnostic interfaces for CLI-based and API-based LLMs.
    contents:
      - AgentDriver
      - GeminiCLIDriver
      - GeminiAPIDriver
      - OpenAIAPIDriver
      - AnthropicAPIDriver
      - OllamaDriver
      - AnthropicCLIDriver
      - CopilotCLIDriver
  - title: Dynamic Driver & Logic Registry
    desc: Tools for hot-swapping drivers and registering domain-specific logic.
    contents:
      - DriverRegistry
      - get_driver_registry
      - list_logic
      - get_logic
      - register_logic
  - title: Messaging & Persistence
    desc: State persistence and inter-node messaging infrastructure.
    contents:
      - MessageLog
      - MemoryMessageLog
      - DuckDBMessageLog
      - JSONLMessageLog
      - Checkpointer
      - MemorySaver
      - DuckDBSaver
      - RDSSaver
  - title: Utilities & Parsing
    desc: Helper functions for mermaid visualization and code extraction.
    contents:
      - AgentTool
      - dag_create
      - parse_mermaid
      - mermaid_to_dag
      - extract_r_code_advanced
      - format_toolset
      - reducer_merge_list
      - reducer_append

articles:
  - title: Instruction Manual
    navbar: Manual
    contents:
      - manual
  - title: Case Studies
    navbar: Case Studies
    contents:
      - hong_kong_travel
      - sorting_benchmark
  - title: Examples Gallery
    navbar: Examples
    contents:
