url: https://github.com/APAF-bioinformatics/HydraR
template:
  bootstrap: 5
  params:
    bootswatch: zephyr

navbar:
  structure:
    left:  [intro, reference, articles, news]
    right: [github]
  components:
      text: Get Started
      href: articles/hong_kong_travel.html

reference:
  - title: Core Orchestration
    desc: The heart of the HydraR framework.
    contents:
      - AgentDAG
      - AgentNode
      - AgentState
  - title: Agent Nodes
    desc: Specialized nodes for LLM interaction, logical routing, and scaling.
    contents:
      - AgentLLMNode
      - AgentLogicNode
